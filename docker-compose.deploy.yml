version: '3.8'

# Production deployment with pre-built images from Docker Registry
# Usage: docker-compose -f docker-compose.deploy.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment to expose DB to host for debugging (not recommended in production)
    # ports:
    #   - "5556:5432"

  app:
    image: docker.io/estemendoza/cis:api-latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - CORS_ALLOW_ALL_ORIGINS=true
      - DISABLE_DOCS=true
    ports:
      - "8000:8000"

  frontend:
    image: docker.io/estemendoza/cis:frontend-latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:80"

volumes:
  db_data:
