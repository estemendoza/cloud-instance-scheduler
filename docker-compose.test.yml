version: "3.8"

services:
  test-db:
    image: postgres:15-alpine
    container_name: cis-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cis_test
    ports:
      - "7777:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cis_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cis_test_db_data:/var/lib/postgresql/data

volumes:
  cis_test_db_data:
